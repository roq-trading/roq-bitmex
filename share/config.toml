symbols = [
  "XBT.*",
]

[order_templates]

  [order_templates.default]
  self_trade_prevention = 'D'

[accounts]

  [accounts.A1]
  master = true
  login = "YOUR_BITMEX_API_KEY_GOES_HERE"
  secret = "YOUR_BITMEX_SECRET_GOES_HERE"
  symbols = [ "BTC-.*", "ETH-.*" ]

[users]

  [users.test]
  password = "1234"
  symbols = ".*"

  [users.trader]
  password = "secret"
  accounts = [ "A1" ]
  symbols = [ "XBTUSD" ]
  monitor_period_secs = 60
  ban_period_secs = 300
  request_limit = 10
