symbols = [
  "^XBTUSD[A-Z]?([FGHJKMNQUVXZ][0-9]{2})?$",
  "^ETHUSD[A-Z]?([FGHJKMNQUVXZ][0-9]{2})?$",
  "^[.]XBTUSD[A-Z]?PI(8H)?$",
  "^[.]ETHUSD[A-Z]?PI(8H)?$"
]

[accounts]

  [accounts.A1]
  master = true
  login = "YOUR_BITMEX_API_KEY_GOES_HERE"
  secret = "YOUR_BITMEX_SECRET_GOES_HERE"
  symbols = [ ".*" ]

[users]

  [users.test]
  password = "1234"
  symbols = ".*"

  [users.trader]
  password = "secret"
  accounts = [ "A1" ]
  symbols = [ ".*XBT.*", ".*ETH.*" ]

[rate_limits]

  [rate_limits.global]
    type = "ORDER_ACTION"
    aggregate = true
    request_limit = 100
    monitor_period = "10s"
    ban_period = "5m"
